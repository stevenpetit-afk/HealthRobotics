name: Wekelijks weekoverzicht (zondag)

on:
  schedule:
    # Zondag 08:00 Amsterdam-tijd ≈ 06:00 UTC (zomertijd) / 07:00 UTC (wintertijd)
    # We zetten 'm op 06:30 UTC als praktisch gemiddelde.
    - cron: "30 6 * * 0"
  workflow_dispatch: {}  # handmatig draaien via de Actions-tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installeer dependencies
        run: pip install anthropic

      - name: Weekoverzicht genereren en versturen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/weekly_summary.py

      - name: Wijzigingen committen
        run: |
          git config user.name "robonews-bot"
          git config user.email "robonews-bot@users.noreply.github.com"
          git add data/ docs/
          git diff --quiet --cached || git commit -m "Weekoverzicht: $(date -u +'%Y-%m-%d')"
          git push
