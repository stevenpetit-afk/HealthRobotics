name: Dagelijks robotica-zorg nieuws

on:
  schedule:
    # 07:00 Amsterdam tijd. GitHub Actions cron draait in UTC,
    # dus 05:00 UTC in zomertijd / 06:00 UTC in wintertijd.
    # We zetten 'm op 05:30 UTC als praktisch gemiddelde.
    - cron: "30 5 * * *"
  workflow_dispatch: {}  # handmatig draaien via de Actions-tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installeer dependencies
        run: pip install anthropic

      - name: Nieuws ophalen en site bouwen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_and_build.py

      - name: Wijzigingen committen
        run: |
          git config user.name "robonews-bot"
          git config user.email "robonews-bot@users.noreply.github.com"
          git add data/ site/
          git diff --quiet --cached || git commit -m "Dagelijkse update: $(date -u +'%Y-%m-%d')"
          git push
